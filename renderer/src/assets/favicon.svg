<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a8e"/>
      <stop offset="100%" style="stop-color:#0d2a5e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Signal bars (representing SMDR/call analytics) -->
  <rect x="20" y="35" width="12" height="30" rx="3" fill="#2484eb"/>
  <rect x="38" y="25" width="12" height="40" rx="3" fill="#2484eb"/>
  <rect x="56" y="15" width="12" height="50" rx="3" fill="#26b67f"/>
  <rect x="74" y="35" width="12" height="30" rx="3" fill="#26b67f"/>
  
  <!-- Border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="rgba(36,132,235,0.3)" stroke-width="2"/>
</svg>
